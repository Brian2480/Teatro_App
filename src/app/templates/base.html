<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr" crossorigin="anonymous">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <title>Sitio {% block title %}{% endblock %}</title>

</head>

<body class="bg-dark">

    <header>
        {% if current_user.is_authenticated %}
        <ul class="nav justify-content-center shadow p-2 nav-pills">
            <li class="nav-item">
                <a class="nav-link {{ 'active' if request.path == url_for('public.index') }}"
                    href="{{url_for('public.index')}}">Inicio</a>
            </li>
            <li class="nav-item">
                <a class="nav-link {{ 'active' if request.path == url_for('admin_panel.show_registers') }}"
                    href="{{url_for('admin_panel.show_registers')}}">Registros</a>
            </li>
            <li class="nav-item">
                <a class="nav-link {{ 'active' if request.path == url_for('admin_panel.show_groups') }}"
                    href="{{url_for('admin_panel.show_groups')}}">Grupos</a>
            </li>
            <li class="nav-item">
                <a class="nav-link {{ 'active' if request.path == url_for('admin_panel.upload_files') }}"
                    href="{{url_for('admin_panel.upload_files')}}">Cuestionarios</a>
            </li>
            <li class="nav-item">
                <a class="nav-link {{ 'active' if request.path == url_for('auth.logout') }}"
                    href="{{url_for('auth.logout')}}">Logout</a>
            </li>
        </ul>
        {% else %}
        <ul class="nav justify-content-center shadow p-2 nav-pills">
            <li class="nav-item p-3">
                <a class="text-white" href="{{url_for('public.index')}}">INICIO</a>
            </li>
        </ul>
        {% endif %}
    </header>



    {% block content %}
    <!-- Contenido Variable -->
    {% endblock %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ndDqU0Gzau9qJ1lfW4pNLlhNTkCfHzAVBReH9diLvGRem5+R9g2FzA8ZGN954O5Q" crossorigin="anonymous">
    </script>

    <script>
    // Selecciona todas las alertas y las cierra después de 5000ms
    setTimeout(function() {
        let alerts = document.querySelectorAll('.alert');
        alerts.forEach(function(alert) {
            let bsAlert = new bootstrap.Alert(alert);
            bsAlert.close();
        });
    }, 5000);
</script>
</body>

</html>
